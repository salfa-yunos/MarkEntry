<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Year 6 Mark Entry — SR Perpindahan Kampong Lambak Kanan</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#0d1117;
  --surface:#161b22;
  --surface2:#21262d;
  --border:#30363d;
  --accent:#3b82f6;
  --accent2:#60a5fa;
  --accent-glow:rgba(59,130,246,.15);
  --text:#e6edf3;
  --muted:#8b949e;
  --success:#3fb950;
  --warning:#d29922;
  --danger:#f85149;
  --radius:12px;
  --radius-sm:8px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Sora',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

/* HEADER */
.header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:16px 20px;
  display:flex;
  align-items:center;
  gap:12px;
  position:sticky;
  top:0;
  z-index:100;
}
.header-icon{
  width:36px;height:36px;
  background:linear-gradient(135deg,var(--accent),#7c3aed);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
}
.header-title{font-size:14px;font-weight:600}
.header-sub{font-size:11px;color:var(--muted)}
.header-back{
  margin-left:auto;
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text);
  padding:7px 14px;
  border-radius:var(--radius-sm);
  cursor:pointer;
}
.header-back:disabled{opacity:.3}

/* LAYOUT */
.main{max-width:600px;margin:0 auto;padding:16px 16px 90px}
.page{display:none}
.page.active{display:block}

/* BUTTONS */
.btn{
  width:100%;
  padding:14px;
  border-radius:var(--radius);
  font-weight:600;
  border:none;
  cursor:pointer;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-success{background:var(--success);color:#fff}

/* CARDS */
.cards-grid{display:flex;flex-direction:column;gap:10px}
.card-btn{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
}
.card-btn:hover{border-color:var(--accent)}
.card-icon{
  width:40px;height:40px;
  border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
}

/* MARK ENTRY */
.student-row{
  display:flex;
  align-items:center;
  padding:10px;
  border-bottom:1px solid var(--border);
  gap:10px;
}
.student-name{flex:1;font-size:13px}
.mark-input{
  width:64px;
  padding:6px;
  text-align:center;
  background:var(--bg);
  color:var(--text);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  font-family:'JetBrains Mono',monospace;
}
.mark-input.over{border-color:var(--danger)}
.mark-input.filled{border-color:var(--success)}

.footer-actions{
  position:fixed;
  bottom:0;left:0;right:0;
  max-width:600px;
  margin:0 auto;
  display:flex;
  gap:10px;
  background:var(--surface);
  padding:12px;
  border-top:1px solid var(--border);
}

.toast{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);
  background:var(--success);
  color:#fff;
  padding:10px 20px;
  border-radius:20px;
  opacity:0;
  transition:.3s;
}
.toast.show{opacity:1}
</style>
</head>

<body>

<div class="header">
  <div class="header-icon">📝</div>
  <div>
    <div class="header-title">Year 6 Mark Entry</div>
    <div class="header-sub">SR Perpindahan Kampong Lambak Kanan</div>
  </div>
  <button class="header-back" id="backBtn" onclick="goBack()" disabled>← Back</button>
</div>

<div class="main">

<div class="page active" id="page-test">
  <h2>Select Test</h2>
  <div class="cards-grid">
    <button class="card-btn" onclick="selectTest('T1')"><div class="card-icon">🔵</div>Test 1</button>
    <button class="card-btn" onclick="selectTest('T2')"><div class="card-icon">🟣</div>Test 2</button>
    <button class="card-btn" onclick="selectTest('T3')"><div class="card-icon">🟡</div>Test 3</button>
    <button class="card-btn" onclick="selectTest('T4')"><div class="card-icon">🔴</div>Test 4</button>
  </div>
</div>

<div class="page" id="page-marks">
  <h2 id="marks-title"></h2>
  <div id="marks-area"></div>
</div>

</div>

<div class="footer-actions" id="footer" style="display:none">
  <button class="btn btn-secondary" onclick="goBack()">← Back</button>
  <button class="btn btn-primary" onclick="saveMarks()">Save</button>
</div>

<div class="toast" id="toast"></div>

<script>
const STUDENTS=[
 'Abdul Ammar Mustaqim Bin Mohammad Sumerdi',
 'Nur Rizqah Humaira Binti Johari'
];

const POWER_AUTOMATE_URL="https://default055b48fa571c47108e87b79ff84ea4.86.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/3e9648279ec54e25a6de1f5782074e64/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=m0duXkSoFLfBbFpoRJaNoCyKd6X39KI1OiDYFK2k-D4";

let pageStack=['test'];
let currentTest=null;
let marks={};

function showPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('footer').style.display=p==='marks'?'flex':'none';
  document.getElementById('backBtn').disabled=pageStack.length<=1;
}

function selectTest(t){
  currentTest=t;
  pageStack.push('marks');
  renderMarks();
  showPage('marks');
}

function renderMarks(){
  document.getElementById('marks-title').textContent=`${currentTest} – Science`;
  document.getElementById('marks-area').innerHTML=
    STUDENTS.map((s,i)=>`
      <div class="student-row">
        <span>${i+1}</span>
        <span class="student-name">${s}</span>
        <input class="mark-input" type="number" oninput="marks[${i}]=this.value">
      </div>`).join('');
}

function goBack(){
  if(pageStack.length<=1)return;
  pageStack.pop();
  showPage(pageStack[pageStack.length-1]);
}

async function saveMarks(){
  for(let i=0;i<STUDENTS.length;i++){
    if(marks[i]===''||marks[i]==null)continue;
    await fetch(POWER_AUTOMATE_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        test:currentTest,
        student:STUDENTS[i],
        mark:marks[i]
      })
    });
  }
  showToast('Saved successfully!');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>

</body>
</html>
