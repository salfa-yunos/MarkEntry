<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Year 6 Mark Entry</title>

<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--surface3:#2d333b;
  --border:#30363d;--border2:#444c56;
  --accent:#3b82f6;--accent2:#60a5fa;--accent-glow:rgba(59,130,246,.18);
  --text:#e6edf3;--muted:#8b949e;--muted2:#6e7681;
  --success:#3fb950;--warning:#d29922;--danger:#f85149;--info:#58a6ff;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
button{font-family:'Sora',sans-serif;cursor:pointer}
input{font-family:'Sora',sans-serif}

/* ─── HEADER ─── */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200}
.hdr-icon{width:34px;height:34px;background:linear-gradient(135deg,#3b82f6,#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.hdr-text{flex:1;min-width:0}
.hdr-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:1px}
.hdr-actions{display:flex;gap:6px;flex-shrink:0}
.hdr-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:var(--radius-xs);font-size:12px;font-weight:600;transition:border-color .15s}
.hdr-btn:hover{border-color:var(--accent)}
.hdr-btn:disabled{opacity:.3;cursor:not-allowed}

/* ─── LAYOUT ─── */
.main{max-width:640px;margin:0 auto;padding:16px 14px 100px}
.page{display:none;animation:fadeIn .2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.section-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:0 0 10px}
h2{font-size:17px;font-weight:700;margin-bottom:14px}

/* ─── CARDS ─── */
.cards-grid{display:flex;flex-direction:column;gap:8px}
.card-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;color:var(--text);font-size:14px;font-weight:600;width:100%;text-align:left;transition:border-color .15s,background .15s}
.card-btn:hover{border-color:var(--accent);background:var(--surface2)}
.card-btn:active{transform:scale(.99)}
.card-icon{width:38px;height:38px;border-radius:var(--radius-xs);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.card-sub{font-size:11px;color:var(--muted);font-weight:400;margin-top:2px}

/* ─── BREADCRUMB ─── */
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-bottom:14px;flex-wrap:wrap}
.breadcrumb span{color:var(--muted2)}

/* ─── MARK TABLE ─── */
.mark-table{width:100%;border-collapse:collapse}
.mark-table th{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:8px 6px;border-bottom:2px solid var(--border);text-align:center}
.mark-table th.left{text-align:left}
.mark-table td{padding:6px 4px;border-bottom:1px solid var(--border);vertical-align:middle}
.mark-table tr:last-child td{border-bottom:none}
.snum{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;width:24px;text-align:center}
.sname{font-size:12px;line-height:1.4;padding-left:4px}
.mark-cell{text-align:center;position:relative}
.mark-input{
  width:60px;padding:6px 4px;text-align:center;
  background:var(--bg);color:var(--text);
  border:1.5px solid var(--border);border-radius:var(--radius-xs);
  font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;
  transition:border-color .15s;-moz-appearance:textfield;
}
.mark-input::-webkit-outer-spin-button,.mark-input::-webkit-inner-spin-button{-webkit-appearance:none}
.mark-input:focus{outline:none;border-color:var(--accent)}
.mark-input.filled{border-color:var(--success)}
.mark-input.over{border-color:var(--danger)}
.total-cell{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;text-align:center;min-width:44px}
.grade-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.g-A{background:rgba(63,185,80,.15);color:#3fb950}
.g-B{background:rgba(88,166,255,.15);color:#58a6ff}
.g-C{background:rgba(210,153,34,.15);color:#d29922}
.g-D{background:rgba(248,81,73,.15);color:#f85149}
.g-E{background:rgba(139,148,158,.15);color:#8b949e}
.paper-max{font-size:10px;color:var(--muted);display:block}

/* ─── FOOTER ACTIONS ─── */
.footer-bar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;z-index:150}
.footer-inner{width:100%;max-width:640px;background:var(--surface);border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:8px}
.btn{flex:1;padding:12px;border-radius:var(--radius);font-weight:700;border:none;font-size:13px;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:rgba(248,81,73,.15);color:var(--danger);border:1px solid rgba(248,81,73,.3)}
.btn-info{background:rgba(88,166,255,.12);color:var(--info);border:1px solid rgba(88,166,255,.25)}
.btn:disabled{opacity:.35;cursor:not-allowed}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:700;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1}
.toast.err{background:var(--danger)}
.toast.warn{background:var(--warning)}

/* ─── MODAL ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:640px;padding:20px 16px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px}
.modal-input{width:100%;padding:10px 12px;background:var(--bg);color:var(--text);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;margin-bottom:10px;transition:border-color .15s}
.modal-input:focus{outline:none;border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;margin-top:4px}
.modal-btn{flex:1;padding:10px;border-radius:var(--radius-sm);font-weight:700;border:none;font-size:13px}
.modal-btn-primary{background:var(--accent);color:#fff}
.modal-btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}

/* ─── STUDENT LIST EDITOR ─── */
.student-edit-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.student-edit-row:last-child{border-bottom:none}
.student-edit-name{flex:1;font-size:12px}
.del-btn{background:none;border:none;color:var(--danger);font-size:16px;padding:2px 6px;border-radius:4px}
.del-btn:hover{background:rgba(248,81,73,.1)}

/* ─── PRINT SUMMARY ─── */
.summary-table{width:100%;border-collapse:collapse;font-size:12px}
.summary-table th{padding:8px 6px;background:var(--surface2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border:1px solid var(--border)}
.summary-table td{padding:7px 6px;border:1px solid var(--border);vertical-align:middle}
.summary-table td.right{text-align:right;font-family:'JetBrains Mono',monospace;font-weight:600}

.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tool-btn{padding:7px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:border-color .15s}
.tool-btn:hover{border-color:var(--accent)}
.tool-btn.active{border-color:var(--accent);color:var(--accent2)}

/* ─── PRINT STYLES ─── */
@media print{
  .header,.footer-bar,.toolbar,.no-print{display:none!important}
  body{background:#fff;color:#000}
  .print-area{display:block!important}
  .summary-table th{background:#eee;color:#000}
  .summary-table td,.summary-table th{border:1px solid #ccc}
  .g-A,.g-B,.g-C,.g-D,.g-E{background:none;border:1px solid #999}
}

.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}

.chevron{color:var(--muted);font-size:18px;margin-left:auto}

.class-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin-left:8px}
.c6a{background:rgba(59,130,246,.15);color:#60a5fa}
.c6b{background:rgba(124,58,237,.15);color:#a78bfa}
.c6c{background:rgba(63,185,80,.15);color:#3fb950}
</style>
</head>

  if(p==='summary') renderFooterSummary();
}

function goBack() {
  if(pageStack.length<=1) return;
  pageStack.pop();
  showPage(pageStack[pageStack.length-1]);
}

function selectClass(cls) {
  cur.cls = cls;
  pageStack.push('test');
  document.getElementById('bc-class').textContent = `Class ${classNames[cls]}`;
  showPage('test');
}

function selectTest(t) {
  cur.test = t;
  pageStack.push('subject');
  document.getElementById('bc-test').textContent = `Class ${classNames[cur.cls]}  ›  ${t}`;
  renderSubjectCards();
  showPage('subject');
}

function selectSubject(subj) {
  cur.subj = subj;
  pageStack.push('marks');
  renderMarks();
  showPage('marks');
}

/* ═══════════════════════════════════════════
   SUBJECT CARDS
═══════════════════════════════════════════ */
function renderSubjectCards() {
  const el = document.getElementById('subject-cards');
  el.innerHTML = Object.entries(SUBJECTS).map(([name, s])=>`
    <button class="card-btn" onclick="selectSubject('${name}')">
      <div class="card-icon" style="background:${s.color}">${s.icon}</div>
      <div>${name}
        <div class="card-sub">${s.papers.map(p=>`${p.label} (${p.max})`).join(' · ')} → 100%</div>
      </div>
      <div class="chevron">›</div>
    </button>`).join('');
}

/* ═══════════════════════════════════════════
   MARK ENTRY
═══════════════════════════════════════════ */
function renderMarks() {
  const { cls, test, subj } = cur;
  const subDef = SUBJECTS[subj];
  const sList = students[cls];
  const mStore = getMarks(cls, test, subj);

  document.getElementById('bc-marks').innerHTML =
    `<span>Class ${classNames[cls]}</span> <span>›</span> <span>${test}</span> <span>›</span> <span>${subDef.icon} ${subj}</span>`;

  const paperCols = subDef.papers.map(p=>
    `<th class="mark-cell">${p.label}<span class="paper-max">/${p.max}</span></th>`
  ).join('');

  const rows = sList.map((name, i) => {
    const paperInputs = subDef.papers.map((p, pi) => {
      const val = (mStore[i] && mStore[i][pi] != null) ? mStore[i][pi] : '';
      const cls2 = val !== '' ? (Number(val) > p.max ? ' over' : ' filled') : '';
      return `<td class="mark-cell">
        <input class="mark-input${cls2}" type="number" min="0" max="${p.max}"
          id="mi_${i}_${pi}" value="${val}" placeholder="—"
          oninput="onMark(${i},${pi},this)">
      </td>`;
    }).join('');

    const { pct, display } = calcTotal(mStore[i], subDef.papers);
    const grade = pct != null ? getGrade(pct) : '—';
    const gradeHtml = pct != null ? `<span class="grade-badge g-${grade}">${grade}</span>` : '<span style="color:var(--muted)">—</span>';

    return `<tr>
      <td class="snum">${i+1}</td>
      <td class="sname">${name}</td>
      ${paperInputs}
      <td class="total-cell" id="tot_${i}">${display}</td>
      <td style="text-align:center" id="grade_${i}">${gradeHtml}</td>
    </tr>`;
  }).join('');

  document.getElementById('marks-area').innerHTML = `
    <table class="mark-table">
      <thead><tr>
        <th class="snum">#</th>
        <th class="left">Name</th>
        ${paperCols}
        <th class="mark-cell">Total%</th>
        <th class="mark-cell">Grade</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function calcTotal(row, papers) {
  if(!row) return { pct:null, display:'—' };
  let pct = 0; let hasAny = false;
  for(let pi=0; pi<papers.length; pi++) {
    const v = row[pi];
    if(v == null || v === '') return { pct:null, display:'—' };
    hasAny = true;
    pct += (Number(v) / papers[pi].max) * papers[pi].weight;
  }
  if(!hasAny) return { pct:null, display:'—' };
  return { pct, display: pct.toFixed(1)+'%' };
}

function onMark(i, pi, el) {
  const { cls, test, subj } = cur;
  const mStore = getMarks(cls, test, subj);
  const subDef = SUBJECTS[subj];
  if(!mStore[i]) mStore[i] = {};
  const val = el.value.trim();
  mStore[i][pi] = val === '' ? null : Number(val);

  const max = subDef.papers[pi].max;
  el.classList.toggle('filled', val !== '' && Number(val) <= max);
  el.classList.toggle('over', val !== '' && Number(val) > max);

  // update total & grade
  const { pct, display } = calcTotal(mStore[i], subDef.papers);
  document.getElementById(`tot_${i}`).textContent = display;
  const grade = pct != null ? getGrade(pct) : null;
  document.getElementById(`grade_${i}`).innerHTML = grade
    ? `<span class="grade-badge g-${grade}">${grade}</span>`
    : '<span style="color:var(--muted)">—</span>';
}

/* ═══════════════════════════════════════════
   FOOTER BUTTONS
═══════════════════════════════════════════ */
function renderFooterMarks() {
  document.getElementById('footer-inner').innerHTML = `
    <button class="btn btn-secondary" onclick="goBack()">← Back</button>
    <button class="btn btn-info" onclick="showSummary()">📊 Summary</button>
    <button class="btn btn-primary" id="saveBtn" onclick="saveMarks()">💾 Save</button>`;
}

function renderFooterSummary() {
  document.getElementById('footer-inner').innerHTML = `
    <button class="btn btn-secondary" onclick="goBack()">← Back</button>
    <button class="btn btn-primary" onclick="window.print()">🖨️ Print / PDF</button>`;
}

/* ═══════════════════════════════════════════
   SAVE TO POWER AUTOMATE
═══════════════════════════════════════════ */
async function saveMarks() {
  const { cls, test, subj } = cur;
  const mStore = getMarks(cls, test, subj);
  const sList = students[cls];
  const subDef = SUBJECTS[subj];
  const saveBtn = document.getElementById('saveBtn');

  const entries = [];
  for(let i=0; i<sList.length; i++) {
    const row = mStore[i];
    if(!row) continue;
    const { pct } = calcTotal(row, subDef.papers);
    if(pct == null) continue;
    const paperData = {};
    subDef.papers.forEach((p,pi) => { paperData[p.label] = row[pi]; });
    entries.push({ student: sList[i], papers: paperData, total: parseFloat(pct.toFixed(2)), grade: getGrade(pct) });
  }

  if(!entries.length) { showToast('No complete marks to save.', 'warn'); return; }

  saveBtn.disabled = true;
  saveBtn.innerHTML = '<span class="spinner"></span>Saving…';

  let ok=0, fail=0;
  for(const e of entries) {
    try {
      const res = await fetch(POWER_AUTOMATE_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ class: classNames[cls], test, subject: subj, ...e })
      });
      res.ok ? ok++ : fail++;
    } catch { fail++; }
  }

  saveBtn.disabled = false;
  saveBtn.innerHTML = '💾 Save';

  if(fail===0) showToast(`✓ ${ok} record${ok!==1?'s':''} saved!`);
  else if(ok>0) showToast(`⚠ ${ok} saved, ${fail} failed`, 'warn');
  else showToast('✗ Save failed. Check connection.', 'err');
}

/* ═══════════════════════════════════════════
   SUMMARY / PRINT
═══════════════════════════════════════════ */
function showSummary() {
  const { cls, test, subj } = cur;
  const mStore = getMarks(cls, test, subj);
  const sList = students[cls];
  const subDef = SUBJECTS[subj];

  document.getElementById('bc-summary').innerHTML =
    `<span>Class ${classNames[cls]}</span> <span>›</span> <span>${test}</span> <span>›</span> <span>${subDef.icon} ${subj} — Summary</span>`;

  const paperCols = subDef.papers.map(p=>`<th>${p.label}<br><span style="font-weight:400;color:var(--muted)">/${p.max}</span></th>`).join('');

  const rows = sList.map((name, i) => {
    const row = mStore[i] || {};
    const { pct, display } = calcTotal(row, subDef.papers);
    const grade = pct != null ? getGrade(pct) : '—';
    const paperVals = subDef.papers.map((_,pi)=>`<td class="right">${row[pi]!=null?row[pi]:'—'}</td>`).join('');
    const gradeHtml = pct!=null ? `<span class="grade-badge g-${grade}">${grade}</span>` : '—';
    return `<tr>
      <td style="text-align:center;color:var(--muted);font-family:'JetBrains Mono',monospace">${i+1}</td>
      <td>${name}</td>
      ${paperVals}
      <td class="right">${display}</td>
      <td style="text-align:center">${gradeHtml}</td>
    </tr>`;
  }).join('');

  // grade distribution
  let dist = {A:0,B:0,C:0,D:0,E:0};
  sList.forEach((_,i)=>{ const {pct}=calcTotal(mStore[i]||{}, subDef.papers); if(pct!=null) dist[getGrade(pct)]++; });
  const distHtml = Object.entries(dist).map(([g,n])=>
    `<span class="grade-badge g-${g}" style="margin-right:6px">${g}: ${n}</span>`).join('');

  document.getElementById('summary-area').innerHTML = `
    <div style="margin-bottom:12px">
      <div style="font-size:16px;font-weight:700">${schoolName}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:2px">Class ${classNames[cls]} · ${test} · ${subj}</div>
    </div>
    <div style="margin-bottom:12px">${distHtml}</div>
    <table class="summary-table">
      <thead><tr>
        <th style="width:30px">#</th>
        <th style="text-align:left">Student Name</th>
        ${paperCols}
        <th>Total %</th>
        <th>Grade</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

  pageStack.push('summary');
  showPage('summary');
}

function printSummary() { showSummary(); }

/* ═══════════════════════════════════════════
   MODALS
═══════════════════════════════════════════ */
function openModal(id) { document.getElementById(id).style.display='flex'; }
function closeModal(id) { document.getElementById(id).style.display='none'; }

function openEditSchool() {
  document.getElementById('input-school').value = schoolName;
  openModal('modal-school');
}
function saveSchoolName() {
  const v = document.getElementById('input-school').value.trim();
  if(!v) return;
  schoolName = v;
  document.getElementById('hdr-school').textContent = v;
  closeModal('modal-school');
  showToast('School name updated');
}

function openEditClass() {
  document.getElementById('input-class').value = classNames[cur.cls];
  openModal('modal-class');
}
function saveClassName() {
  const v = document.getElementById('input-class').value.trim();
  if(!v) return;
  classNames[cur.cls] = v;
  renderMarks();
  closeModal('modal-class');
  showToast('Class name updated');
}

function openManageStudents() {
  document.getElementById('modal-class-label').textContent = `Class ${classNames[cur.cls]}`;
  renderStudentEditor();
  openModal('modal-students');
}

function renderStudentEditor() {
  const sList = students[cur.cls];
  document.getElementById('student-list-editor').innerHTML = sList.map((name,i)=>`
    <div class="student-edit-row">
      <span class="student-edit-name">${i+1}. ${name}</span>
      <button class="del-btn" onclick="removeStudent(${i})">🗑</button>
    </div>`).join('');
}

function removeStudent(i) {
  if(!confirm(`Remove "${students[cur.cls][i]}"?`)) return;
  students[cur.cls].splice(i,1);
  // also remove their marks across all tests/subjects
  for(const t in marks[cur.cls]||{}) {
    for(const s in marks[cur.cls][t]||{}) {
      const mStore = marks[cur.cls][t][s];
      const newStore = {};
      let ni=0;
      Object.keys(mStore).forEach(ki=>{
        if(Number(ki)!==i) { newStore[ni]=mStore[ki]; ni++; }
      });
      marks[cur.cls][t][s] = newStore;
    }
  }
  renderStudentEditor();
  renderMarks();
  showToast('Student removed');
}

function addStudent() {
  const v = document.getElementById('input-new-student').value.trim();
  if(!v) return;
  students[cur.cls].push(v);
  document.getElementById('input-new-student').value='';
  renderStudentEditor();
  renderMarks();
  showToast('Student added');
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
let toastTimer;
function showToast(msg, type='ok') {
  clearTimeout(toastTimer);
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type==='err'?' err':type==='warn'?' warn':'');
  t.classList.add('show');
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2800);
}
</script>
